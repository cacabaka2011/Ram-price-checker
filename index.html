<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tracker Prix DDR5</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { 
            background: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px;
        }
        #chart-container {
            width: 90%;
            max-width: 900px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #00ff88; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

    <h1>Bourse du prix : RAM DDR5 32GB CL30 6000MHz</h1>

    <div id="chart-container">
        <div id="chart"></div>
    </div>

    <script>
        fetch('./data.json?v=' + new Date().getTime()) 
            .then(response => response.json())
            .then(jsonData => {
                var options = {
                    series: [{ name: 'Prix Moyen (€)', data: jsonData }],
                    chart: {
                        type: 'area',
                        height: 400,
                        foreColor: '#abb2bf',
                        // --- CONFIGURATION DU ZOOM ---
                        zoom: {
                            enabled: true,
                            type: 'x',  // Zoom sur l'axe horizontal
                            autoScaleYaxis: true // Ajuste l'échelle de prix automatiquement au zoom
                        },
                        toolbar: {
                            show: true,
                            tools: {
                                download: false, // On cache le téléchargement
                                selection: true,
                                zoom: true,
                                zoomin: true,
                                zoomout: true,
                                pan: true, // Permet de déplacer le graphique quand on est zoomé
                                reset: true // Bouton pour revenir à la vue totale
                            }
                        }
                    },
                    colors: ['#00ff88'], 
                    stroke: { curve: 'smooth', width: 3 },
                    fill: {
                        type: 'gradient',
                        gradient: { shadeIntensity: 1, opacityFrom: 0.5, opacityTo: 0.1 }
                    },
                    xaxis: { 
                        type: 'datetime',
                        tooltip: { enabled: false } // Cache le petit badge de date sur l'axe
                    },
                    yaxis: { 
                        labels: { formatter: (value) => value.toFixed(2) + " €" },
                        forceNiceScale: true // Pour avoir des chiffres ronds sur l'axe
                    },
                    tooltip: { 
                        theme: 'dark', 
                        x: { format: 'dd MMM HH:mm' },
                        y: { formatter: (val) => val.toFixed(2) + " €" }
                    },
                    // --- PETITE OPTION POUR LE LOOK ---
                    dataLabels: { enabled: false },
                    markers: { size: 0, hover: { size: 5 } } // Affiche un point quand on passe la souris
                };

                var chart = new ApexCharts(document.querySelector("#chart"), options);
                chart.render();
            })
            .catch(err => {
                document.querySelector("#chart").innerHTML = "<div style='padding:20px; text-align:center;'>Le robot prépare les données... Revenez dans 15 minutes !</div>";
            });
            
        setInterval(() => location.reload(), 900000);
    </script>
</body>
</html>
